<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Weather Website</title>

  <!-- Spline Background -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.53/build/spline-viewer.js"></script>

  <style>
    /* Spline background */
    spline-viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      padding-top: 100px;
      background: transparent;
    }

    .weather-box {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      background: orange;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- 3D Background -->
  <spline-viewer url="https://prod.spline.design/wGv6iQJYoYSQWipl/scene.splinecode"></spline-viewer>

  <!-- Weather UI -->
  <div class="weather-box">
    <h1>🌤 Weather App</h1>

    <input id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>

    <h2 id="temp"></h2>
    <p id="desc"></p>
  </div>

<script>
const apiKey = "YOUR_API_KEY_HERE"; // put your API key

function getWeather() {
  const city = document.getElementById("city").value;
  const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      document.getElementById("temp").innerText =
        data.main.temp + "°C";
      document.getElementById("desc").innerText =
        data.weather[0].description;
    })
    .catch(() => alert("City not found"));
}
</script>

</body>
</html>
